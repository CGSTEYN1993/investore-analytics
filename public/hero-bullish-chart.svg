<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Bullish stock chart with rising candles">
  <defs>
    <linearGradient id="rise-line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#b87333"/>
      <stop offset="55%" stop-color="#c9a86a"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <linearGradient id="rise-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="grid-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- subtle horizontal grid -->
  <g stroke="url(#grid-fade)" stroke-width="1">
    <line x1="0" y1="80"  x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
  </g>

  <!-- y-axis price ticks (silver) -->
  <g fill="#9aa0a6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" text-anchor="end">
    <text x="790" y="84">$2,840</text>
    <text x="790" y="164">$2,720</text>
    <text x="790" y="244">$2,600</text>
    <text x="790" y="324">$2,480</text>
  </g>

  <!-- area under trend line -->
  <path d="M 70 295 L 130 305 L 190 280 L 250 270 L 310 275 L 370 240 L 430 225 L 490 235 L 550 195 L 610 170 L 670 160 L 730 110 L 730 380 L 70 380 Z"
        fill="url(#rise-area)"/>

  <!-- candlesticks -->
  <g>
    <!-- bullish: gold body, copper wick. bearish: hollow copper. -->
    <!-- c1 bullish (o=310 c=295 h=290 l=315) -->
    <line x1="70" y1="290" x2="70" y2="315" stroke="#b87333" stroke-width="1"/>
    <rect x="62" y="295" width="16" height="15" fill="#d4af37"/>
    <!-- c2 bearish (o=295 c=305 h=290 l=310) -->
    <line x1="130" y1="290" x2="130" y2="310" stroke="#8a8a8a" stroke-width="1"/>
    <rect x="122" y="295" width="16" height="10" fill="none" stroke="#b87333" stroke-width="1.2"/>
    <!-- c3 bullish big (o=305 c=280 h=275 l=310) -->
    <line x1="190" y1="275" x2="190" y2="310" stroke="#b87333" stroke-width="1"/>
    <rect x="182" y="280" width="16" height="25" fill="#d4af37"/>
    <!-- c4 bullish (o=280 c=270 h=265 l=285) -->
    <line x1="250" y1="265" x2="250" y2="285" stroke="#b87333" stroke-width="1"/>
    <rect x="242" y="270" width="16" height="10" fill="#d4af37"/>
    <!-- c5 bearish small (o=270 c=275 h=265 l=280) -->
    <line x1="310" y1="265" x2="310" y2="280" stroke="#8a8a8a" stroke-width="1"/>
    <rect x="302" y="270" width="16" height="5" fill="none" stroke="#b87333" stroke-width="1.2"/>
    <!-- c6 bullish big (o=275 c=240 h=235 l=280) -->
    <line x1="370" y1="235" x2="370" y2="280" stroke="#b87333" stroke-width="1"/>
    <rect x="362" y="240" width="16" height="35" fill="#d4af37"/>
    <!-- c7 bullish (o=240 c=225 h=220 l=245) -->
    <line x1="430" y1="220" x2="430" y2="245" stroke="#b87333" stroke-width="1"/>
    <rect x="422" y="225" width="16" height="15" fill="#d4af37"/>
    <!-- c8 bearish small (o=225 c=235 h=220 l=240) -->
    <line x1="490" y1="220" x2="490" y2="240" stroke="#8a8a8a" stroke-width="1"/>
    <rect x="482" y="225" width="16" height="10" fill="none" stroke="#b87333" stroke-width="1.2"/>
    <!-- c9 bullish big (o=235 c=195 h=185 l=240) -->
    <line x1="550" y1="185" x2="550" y2="240" stroke="#b87333" stroke-width="1"/>
    <rect x="542" y="195" width="16" height="40" fill="#d4af37"/>
    <!-- c10 bullish (o=195 c=170 h=165 l=200) -->
    <line x1="610" y1="165" x2="610" y2="200" stroke="#b87333" stroke-width="1"/>
    <rect x="602" y="170" width="16" height="25" fill="#d4af37"/>
    <!-- c11 bullish (o=170 c=160 h=150 l=175) -->
    <line x1="670" y1="150" x2="670" y2="175" stroke="#b87333" stroke-width="1"/>
    <rect x="662" y="160" width="16" height="10" fill="#d4af37"/>
    <!-- c12 bullish breakout (o=160 c=110 h=100 l=165) -->
    <line x1="730" y1="100" x2="730" y2="165" stroke="#b87333" stroke-width="1"/>
    <rect x="722" y="110" width="16" height="50" fill="#d4af37"/>
  </g>

  <!-- trend line over the closes -->
  <path d="M 70 295 L 130 305 L 190 280 L 250 270 L 310 275 L 370 240 L 430 225 L 490 235 L 550 195 L 610 170 L 670 160 L 730 110"
        fill="none" stroke="url(#rise-line)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- last-price marker -->
  <g>
    <line x1="0" y1="110" x2="800" y2="110" stroke="#d4af37" stroke-opacity="0.25" stroke-dasharray="3 4"/>
    <circle cx="730" cy="110" r="4" fill="#d4af37"/>
    <circle cx="730" cy="110" r="8" fill="#d4af37" fill-opacity="0.2"/>
  </g>

  <!-- price pill (top right) -->
  <g transform="translate(620,30)">
    <rect width="150" height="30" rx="4" fill="#1a1a1a" stroke="#c0c0c0" stroke-opacity="0.35"/>
    <text x="12" y="20" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">LAST  $2,840</text>
    <text x="100" y="20" fill="#d4af37" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600">+12.4%</text>
  </g>
</svg>
